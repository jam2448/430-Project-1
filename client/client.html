<!DOCTYPE html>
<html lang="en">

<head>
  <title>Our simple HTTP server</title>
  <link rel="stylesheet" type="text/css" href="/style.css">

  <script>

    const handleResponse = async (response, method) => {

      const content = document.querySelector('#content');

      switch (response.status) {
        case 200:
          content.innerHTML = `<b>Success</b>`
          break;

        case 201:
          content.innerHTML = `<b>Created Country</b>`
          break;

        case 204:
          content.innerHTML = `<b>Updated Country (No Content)</b>`
          break;

        case 400:
          content.innerHTML = `<b>Bad Request</b>`
          break;

        case 404:
          content.innerHTML = `<b>Not Found</b>`
          break;

      }

      //if it is a head reqest, dont pring the body of the message
      if (method !== 'head' && response.status !== 204) {

        const obj = await response.json();

        if (obj.users) {

          const stringedData = JSON.stringify(obj.users);
          content.innerHTML += `<p>${stringedData}</p>`;

        }
        else if (obj.message) {

          content.innerHTML += `<p>${obj.message}</p>`;

        }
        console.log(obj);
      }

    };


    //get the url and the method select and pass that tp the response handler
    const requestUpdate = async (userForm) => {

      const url = userForm.querySelector('#urlField').value;
      const method = userForm.querySelector('#methodSelect').value;

      const response = await fetch(url, {
        method: method,

        headers: {
          'Accept': 'application/json',
        },

      });

      handleResponse(response, method);

    };

    const sendCountry = async (countryForm) => {
      const url = countryForm.getAttribute('action');
      const method = countryForm.getAttribute('method');
      const name = countryForm.querySelector('#nameField').value;
      const capital = countryForm.querySelector('#capitalField').value;
      const currency = countryForm.querySelector('#currencyField').value;

      //build the data string
      let formData = JSON.stringify({ name, capital, currency });

      const response = await fetch(url, {
        method: method,

        headers: {
          'Content-Type': 'application/json',
          'Content-Length': formData.length,
          'Accept': 'application/json',
        },

        body: formData,
      });

      handleResponse(response);

    };

    const sendNationality = async (nationalityForm) => {
      const url = nationalityForm.getAttribute('action');
      const method = nationalityForm.getAttribute('method');
      const name = nationalityForm.querySelector('#nameField').value;
      const nationality = nationalityForm.querySelector('#nationalityField').value;
      const dish = nationalityForm.querySelector('#dishField').value;

      //build the data string
      let formData = JSON.stringify({ name, nationality, dish });

      const response = await fetch(url, {
        method: method,

        headers: {
          'Content-Type': 'application/json',
          'Content-Length': formData.length,
          'Accept': 'application/json',
        },

        body: formData,
      });

      handleResponse(response);

    };

    const init = () => {
      const countryForm = document.querySelector('#countryForm');
      const nationalityForm = document.querySelector('#nationalityForm');
      const userForm = document.querySelector('#userForm');

      //post requests: add country and nationality
      const addCountry = (e) => {
        e.preventDefault();
        sendCountry(countryForm);
        return false;
      }

      const addNationality = (e) => {
        e.preventDefault();
        sendNationality(nationalityForm);
        return false;
      }

      // const getUsers = (e) => {
      //   e.preventDefault();
      //   requestUpdate(userForm);
      //   return false;
      // }

      countryForm.addEventListener('submit', addCountry);
      nationalityForm.addEventListener('submit', addNationality);
      // userForm.addEventListener('submit', getUsers); //call get users when the button is clicked


    };

    window.onload = init;

  </script>
</head>

<body>
  <section id="top">
    <h3>Country API Application</h3>
    <form id="countryForm" action="/addCountry" method="post">
      <label for="name">Country Name: </label>
      <input id="nameField" type="text" name="name" />
      <label for="capital">Capital: </label>
      <input id="capitalField" type="text" name="capital" />
      <label for="currency">Currency: </label>
      <input id="currencyField" type="text" name="currency" />
      <input type="submit" value="Add Country" />
    </form>

    <form id="nationalityForm" action="/addNationality" method="post">
      <label for="name">Country Name: </label>
      <input id="nameField" type="text" name="name" />
      <label for="nationality">Nationality: </label>
      <input id="nationalityField" type="text" name="nationality" />
      <label for="dish">National Dish: </label>
      <input id="dishField" type="text" name="dish" />
      <input type="submit" value="Add Nationality & Dish" />
    </form>


    <form id="userForm" action="/getContinent" method="get">
      <select id='urlField'>
        <option value='americas'>Americas</option>
        <option value='africa'>Africa </option>
        <option value='antartica'>Antartica</option>
        <option value='asia'>Asia</option>
        <option value='eurpoe'>Eurpoe</option>
        <option value='oceania'>Oceania</option>

      </select>

      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Region" />
      <input type="submit" value="Get All Countries" />
    </form>
  </section>
  <section id="content">
  </section>
</body>

</html>
